name: NearMint Card Tracker

on:
  schedule:
    # Runs every 10 minutes.
    - cron: '*/10 * * * *'
  workflow_dispatch: # Allows you to manually trigger it from the UI to test

jobs:
  run-tracker:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Gives GitHub permission to save seen_cards.json

    steps:
      - name: Checkout Repository Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install Scraping Tools
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4

      - name: Run Scraper
        run: python nearmint_alert.py

      - name: Commit & Save Memory File
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add seen_cards.json
          git commit -m "Update tracker memory [skip ci]" || exit 0
          git push
